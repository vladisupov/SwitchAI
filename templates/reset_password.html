{% extends "base.html" %}

{% block content %}
<meta charset="UTF-8">
<style>
    .main-div{
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .set-password-div{
        width: 90%;
        max-width: 500px;
        height: 600px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0;
        margin: 0;
        position: relative;
        bottom: 150px;
    }
    .set-password-div img{
        width: 200px;
        height: 200px;
        margin-bottom: 30px;
    }
    .set-password-div h2, p{
        margin: 0;
        margin-bottom: 10px;
        font-weight: 800;
    }
    .set-password-div h2{
        margin-bottom: 20px;
    }
    .input-btn-div{
        width: 80%;
        height: 200px;
        display: flex;
        flex-direction: column;
    }
    .password-input{
        width: 100%;
        padding: 12px 40px 12px 12px;
        border-radius: 8px;
        background: #f5f9fa;
        border: 1px solid black;
        color: black;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 20px;
    }
    .password-input:focus{
        border-color: #FFD600;
        box-shadow: 0 0 0.5rem #FFD600;
        background-color: white;
    }
    .buttons-div{
        padding: 0;
        margin: 0;
        width: 100%;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
    }
    .button{
        padding: 10px 20px;
        border-radius: 10px;
        border: none;
        font-weight: 800;
        text-decoration: none;
        color: black;
        transition: transform 0.3s ease;
        outline: none;
        margin-top: 20px;
    }
    @media (hover: hover){
        .button:hover{
            text-decoration: none;
            transform: scale(1.05);
            color: black;
            filter: brightness(90%);
        }
    }
    .button:focus{
        outline: none;
    }
    .button:active{
        outline: none;
        transform: scale(0.95);
        filter: brightness(90%);
        transition: transform 0.1s ease-in-out;
    }
    #back-btn{
        box-shadow: 0 0 7px #00E6FF;
        background-color: #00E6FF;
        margin-right: 5px;
    }
    #set-password-btn{
        box-shadow: 0 0 7px #76ff03;
        background-color: #76ff03;
        margin-left: 5px;
    }
    #second-back-btn{
        box-shadow: 0 0 7px #00E6FF;
        background-color: #00E6FF;
        margin-right: 5px;
    }
    #resend-email-btn{
        box-shadow: 0 0 7px #76ff03;
        background-color: #76ff03;
        margin-left: 5px;
    }
    #main-btn{
        display: none;
        box-shadow: 0 0 7px #00E6FF;
        background-color: #00E6FF;
        margin-right: 5px;
    }
    #to-login-btn{
        display: none;
        box-shadow: 0 0 7px #76ff03;
        background-color: #76ff03;
        margin-left: 5px;
    }
    .reset-error-div{
        width: 90%;
        max-width: 530px;
        height: 630px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 20px 20px;
        margin: 0;
        position: relative;
        bottom: 100px;
        border: 1px solid #c5c5c5;
        border-radius: 15px;
        box-shadow: 0 0 7px #8f8f8f;
    }
    .reset-error-div img{
        width: 200px;
        height: 200px;
        margin: 30px 0;
    }
    .reset-error-div p, h2{
        font-weight: 800;
    }
    .reset-error-div p{
        margin: 0;
        margin: 20px 0;
        width: 80%;
    }
    .message{
        padding: 0 !important;
        width: 100% !important;
        text-align: right !important;
        position: absolute !important;
        bottom: 20px !important;
        right: 20px;
        font-weight: 200 !important;
    }
    .password-wrapper{
        position: relative;
    }
    .eye-toggle {
        position: absolute;
        right: 12px;
        top: 40%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #5c6470;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        z-index: 3;
    }
    .eye-toggle:focus{
        outline: none;
    }
    @media (hover: hover){
        .eye-toggle:hover {
            color: #FFD600;
        }
    }
    @media (max-width: 600px){
        .set-password-div{
            bottom: 0;
            justify-content: flex-start;
            width: 100%;
        }
        .main-div{
            align-items: flex-start;
        }
        .reset-error-div img{
            width: 150px;
            height: 150px;
            margin: 20px 0;
        }
        .reset-error-div p{
            margin: 0;
            margin: 20px 5px;
            width: auto;
            text-align: center;
        }
        .reset-error-div h2{
            font-size: 1.5rem;
        }
        .reset-error-div{
            padding: 10px 10px;
            justify-content: center;
            height: 450px;
        }
        .button{
            margin-top: 20px;
            margin-left: 10px;
            padding: 10px 10px;
            font-size: 1rem;
        }
        .buttons-div{
            top: 0 !important;
            margin: 0 5px;
        }
        .message{
            position: absolute !important;
            bottom: 0 !important;
            font-weight: 200 !important;
            margin: 0 !important;
            width: auto !important;
            text-align: right !important;
        }
    }
    .set-password-message{
        padding: 0 !important;
        width: 100% !important;
        text-align: right !important;
        font-weight: 200 !important;
    }
    @media (max-width: 350px){
        .reset-error-div h2{
            font-size: 1.25rem;
        }
        .button{
            font-size: 12px;
        }
    }
</style>
<div class="main-div">
    {% if message == "OK" %}
        <div class="set-password-div">
            <img src="/static/img/reset_password.png" alt="Иконка">
            <h2>Сброс пароля</h2>
            <p>Придумайте новый пароль</p>
            <div class="input-btn-div">
                <div class="password-wrapper">
                    <input type="password" class="password-input" id="password-input" placeholder="Пароль">
                    <button type="button" class="eye-toggle" onclick="togglePassword('password-input', this)">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <div class="password-wrapper">
                    <input type="password" class="password-input" id="repeat-password-input" placeholder="Повторите пароль">
                    <button type="button" class="eye-toggle" onclick="togglePassword('repeat-password-input', this)">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <div class="buttons-div">
                    <button class="button" id="back-btn" onclick="location.href='/forgot_password'">Назад</button>
                    <button class="button" id="set-password-btn">Установить пароль</button>
                    <button class="button" id="main-btn" onclick="location.href='/'">На главную</button>
                    <button class="button" id="to-login-btn" onclick="location.href='/login'">Войти</button>
                </div>
                <p class="set-password-message" id="set-password-message"></p>
            </div>
        </div>
    {% else %}
        <div class="reset-error-div">
            <img src="/static/img/reset_password_error.jpeg" alt="">
            <h2>Ошибка сброса пароля</h2>
            <p>При попытке сброса пароля произошла ошибка: {{message}}</p>
            <div class="buttons-div" style="position: relative; top: 70px;">
                <button class="button" id="second-back-btn" onclick="location.href='/forgot_password'">Назад</button>
                <button class="button" id="resend-email-btn">Отправить письмо еще раз</button>
            </div>
            <p class="message" id="message"></p>
        </div>
    {% endif %}
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    document.addEventListener("DOMContentLoaded", function(){
        const resendBtn = document.getElementById('resend-email-btn');
        const message = document.getElementById('message')
        if (resendBtn){
            resendBtn.addEventListener("click", function(){
                resendBtn.disabled = true;
                resendBtn.style.opacity = "0.5";
                resendBtn.innerText = "Отправка...";

                const email = "{{email or ''}}";
                if (!email){
                    message.innerText = "Ошибка: email не найден.";
                    message.style.color = "red";
                    resendBtn.disabled = false;
                    resendBtn.style.opacity = "1";
                    resendBtn.innerText = "Отправить письмо еще раз";
                    return;
                }

                const formData = new FormData();
                formData.append("email", email);

                fetch('/send_password_email', {
                    method: "POST",
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message){
                        message.innerText = data.message;
                        message.style.color = "green";
                        resendBtn.innerText = "Отправлено";
                        // Кнопка разблокирутся через 30 секунд
                        setTimeout(() => {
                            resendBtn.disabled = false;
                            resendBtn.style.opacity = '1';
                            resendBtn.innerText = "Отправить письмо еще раз";
                        }, 30000);
                    }
                    else if (data.error){
                        message.innerText = "Ошибка:" + data.error;
                        message.style.color = "red";
                        resendBtn.innerText = 'Отправить письмо еще раз';
                        setTimeout(() => {
                            resendBtn.disabled = false;
                            resendBtn.style.opacity = '1';
                        }, 10000);
                    }
                })
                .catch(error => {
                    message.innerText = "Произошла ошибка при отправке";
                    message.style.color = "red";
                    resendBtn.disabled = false;
                    resendBtn.opacity = "1";
                    resendBtn.innerText = "Отправить письмо еще раз";
                })
            });
        }
        const setPasswordBtn = document.getElementById("set-password-btn");
        const setPasswordMessage = document.getElementById("set-password-message");
        const backBtn = document.getElementById('back-btn');
        const mainBtn = document.getElementById("main-btn");
        const loginBtn = document.getElementById("to-login-btn");

        if (setPasswordBtn){
            setPasswordBtn.addEventListener("click", function(){
                setPasswordBtn.disabled = true;
                setPasswordBtn.style.opacity = "0.5";
                setPasswordBtn.innerText = "Установка пароля...";

                const passwordInput = document.getElementById("password-input");
                const repeatPasswordInput = document.getElementById("repeat-password-input");

                const password = passwordInput.value;
                const repeatPassword = repeatPasswordInput.value;

                if (!password){
                    setPasswordMessage.innerText = "Введите пароль";
                    setPasswordMessage.style.color = "red";
                    setPasswordBtn.disabled = false;
                    setPasswordBtn.style.opacity = "1";
                    setPasswordBtn.innerText = "Установить пароль";
                    return;
                }
                if (!repeatPassword){
                    setPasswordMessage.innerText = "Повторите пароль";
                    setPasswordMessage.style.color = "red";
                    setPasswordBtn.disabled = false;
                    setPasswordBtn.style.opacity = "1";
                    setPasswordBtn.innerText = "Установить пароль";
                    return;
                }
                if (password.length < 8){
                    setPasswordMessage.innerText = "Пароль должен содержать не менее 8 символов";
                    setPasswordMessage.style.color = "red";
                    setPasswordBtn.disabled = false;
                    setPasswordBtn.style.opacity = "1";
                    setPasswordBtn.innerText = "Установить пароль";
                    return;
                }
                if (password != repeatPassword){
                    setPasswordMessage.innerText = "Пароли не совпадают";
                    setPasswordMessage.style.color = "red";
                    setPasswordBtn.disabled = false;
                    setPasswordBtn.style.opacity = "1";
                    setPasswordBtn.innerText = "Установить пароль";
                    return;
                }

                email = "{{email or ''}}";
                if (!email){
                    setPasswordMessage.innerText = "Email не предоставлен";
                    setPasswordMessage.style.color = "red";
                    setPasswordBtn.disabled = false;
                    setPasswordBtn.style.opacity = "1";
                    setPasswordBtn.innerText = "Установить пароль";
                    return;
                }

                const formData = new FormData();
                formData.append("email", email);
                formData.append("password", password);

                fetch("/change_password", {
                    method: "POST",
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message){
                        setPasswordMessage.innerText = data.message;
                        setPasswordMessage.style.color = "green";
                        setPasswordBtn.style.display = "none";
                        backBtn.style.display = "none";
                        mainBtn.style.display = "block";
                        loginBtn.style.display = "block";
                    }
                    else if (data.error){
                        setPasswordMessage.innerText = "Ошибка:" + data.error;
                        setPasswordMessage.style.color = "red";
                        setPasswordBtn.disabled = false;
                        setPasswordBtn.style.opacity = "1";
                        setPasswordBtn.innerText = "Установить пароль";
                    }
                })
                .catch(error =>{
                    setPasswordMessage.innerText = "Ошибка при установке пароля. Попробуйте еще раз";
                    setPasswordMessage.style.color = "red";
                    setPasswordBtn.disabled = false;
                    setPasswordBtn.style.opacity = "1";
                    setPasswordBtn.innerText = "Установить пароль";
                })
            })
        }
    });
    // Инициализация иконок
    lucide.createIcons();
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        // Ищем элемент, у которого есть атрибут data-lucide
        const icon = button.querySelector('[data-lucide]'); 

        if (!input || !icon) {
            return;
        }

        if (input.type === 'password') {
            input.type = 'text';
            input.style.outline = 'none';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            input.style.outline = 'none';
            icon.setAttribute('data-lucide', 'eye');
        }
        
        // Перерисовываем иконки, чтобы Lucide заменил атрибут на новый SVG
        lucide.createIcons();
    }
</script>
{% endblock %}
